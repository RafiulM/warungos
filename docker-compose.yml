services:
  postgres:
    image: postgres:16-alpine
    container_name: warungos-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: warungos
    ports:
      - "5439:5432"
    volumes:
      - warungos-pg-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d warungos"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  warungos-pg-data:
